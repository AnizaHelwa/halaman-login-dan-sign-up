<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | jamie.</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="main-container">
        <section class="visual-section">
            <img src="silkimage.jpg" class="silk-bg" alt="">
            <div class="logo-container">
                <img src="logojamie.png" alt="Logo Box" class="main-logo">
            </div>
        </section>

        <section class="signup-section">
            <div class="form-content">
                <h1>Create Account</h1>
                <p class="subtitle">Let's get started</p>

                <form>
                    <div class="input-group">
                        <span class="iconamoon--profile"></span>
                        <input type="text" placeholder="Enter your username">
                    </div>

                    <div class="input-group">
                        <span class="dashicons--email"></span>
                        <input type="email" placeholder="Enter your email">
                    </div>

                    <div class="input-group">
                        <span class="mdi-light--lock"></span>
                        <input type="password" placeholder="Create your password">
                    </div>

                    <div class="input-group">
                        <span class="mdi-light--lock"></span>
                        <input type="password" placeholder="Confirm your password">
                    </div>

                    <div class="form-options">
                        <label>
                            <input type="checkbox"> 
                            I agree with <b>Terms</b> and <b>Privacy Policy</b>
                        </label>
                    </div>

                    <button type="submit" class="btn-create">Create Account</button>
                </form>

                <div class="divider">
                    <span>or</span>
                </div>

                <div class="social-login">
                    <button class="social-button"><span class="ic--twotone-apple"></span></button>
                    <button class="social-button"><span class="ri--google-fill"></span></button>
                    <button class="social-button"><span class="ic--sharp-facebook"></span></button>
                </div>

                <p class="footer-text">Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </section>
    </main>

</body>
</html>
